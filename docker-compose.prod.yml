
services:
  app:
    build:
      context: ./app
      dockerfile: Dockerfile.prod
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      FLASK_ENV: production
#    depends_on:
#      - redis
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost|| exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
  rproxy:
    build:
      context: ./nginx
      dockerfile: Dockerfile.prod
    ports:
      - "443:443"
      - "80:80"
    restart: unless-stopped
    depends_on:
      - app
    volumes:
      - /etc/letsencrypt:/etc/letsencrypt:ro
    environment:
      FLASK_ENV: production
      env_file: "rproxy_config.env"


networks:
  app-network:
    driver: bridge
