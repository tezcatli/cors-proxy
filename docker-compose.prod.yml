
services:
  app:
    build:
      context: ./app
      dockerfile: Dockerfile.prod
    ports:
      - "8000:8000"
    environment:
      FLASK_ENV: production
#    depends_on:
#      - redis
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost|| exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
  rproxy:
    build:
      context: ./nginx
      dockerfile: Dockerfile.prod
    ports:
      - "443:443"
      - "80:80"
    depends_on:
      - app
#    environment:
#      FLASK_ENV: production


networks:
  app-network:
    driver: bridge
