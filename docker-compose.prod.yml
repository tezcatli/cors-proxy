
services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.prod
    restart: unless-stopped
    environment:
      FLASK_ENV: production
    env_file:
      - path: ./backend_secrets.env
        required: true
#    depends_on:
#      - redis
    volumes:
      - backend_data:/backend/data
    healthcheck:
      # curl is not in the python-alpine image and the backend listens on 8000,
      # so probe /healthz with the stdlib instead.
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/healthz').status==200 else 1)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
  nginx:
    build:
      context: ./nginx
      dockerfile: Dockerfile.prod
    ports:
      - "443:443"
      - "80:80"
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_started
      frontend:
        condition: service_completed_successfully
    volumes:
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - frontend:/var/www/silence:ro
    environment:
      - FLASK_ENV=production
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
    volumes:
      - frontend:/frontend

volumes:
  frontend:
  backend_data:

