
services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.prod
    restart: unless-stopped
    environment:
      FLASK_ENV: production
    env_file:
      - path: ./backend_secrets.env
        required: true
#    depends_on:
#      - redis
    volumes:
      - backend_data:/backend/data
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost|| exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
  nginx:
    build:
      context: ./nginx
      dockerfile: Dockerfile.prod
    ports:
      - "443:443"
      - "80:80"
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_started
      frontend:
        condition: service_completed_successfully
    volumes:
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - frontend:/var/www/silence:ro
    environment:
      - FLASK_ENV=production
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
    volumes:
      - frontend:/frontend

volumes:
  frontend:
  backend_data:

