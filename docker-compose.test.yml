x-test-env: &test-env
  JWT_SECRET: "test-jwt-secret-long-enough-for-hs256"
  ADMIN_KEY: "test-admin-key"
  IGDB_CLIENT_ID: "test-igdb-client-id"
  IGDB_CLIENT_SECRET: "test-igdb-client-secret"
  RESET_BASE_URL: "http://testserver"
  SMTP_HOST: ""

services:
  corsproxy-test:
    build:
      context: ./corsproxy
      dockerfile: Dockerfile.test
    environment:
      <<: *test-env
      DEBUG: "false"
    volumes:
      - ./corsproxy:/corsproxy
      - ./contracts:/contracts

  corsproxy-server:
    build:
      context: ./corsproxy
      dockerfile: Dockerfile.dev
    environment:
      <<: *test-env
      FLASK_APP: app.py
      DEBUG: "true"
    volumes:
      - ./corsproxy:/corsproxy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000/')"]
      interval: 2s
      timeout: 5s
      retries: 15
      start_period: 5s

  frontend-test:
    build:
      context: ./silence
      dockerfile: Dockerfile.test
    depends_on:
      corsproxy-server:
        condition: service_healthy
    environment:
      BACKEND_URL: http://corsproxy-server:5000
      ADMIN_KEY: test-admin-key
    volumes:
      - ./silence:/silence
      - ./contracts:/contracts
