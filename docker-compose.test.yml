x-test-env: &test-env
  JWT_SECRET: "test-jwt-secret-long-enough-for-hs256"
  ADMIN_KEY: "test-admin-key"
  IGDB_CLIENT_ID: "test-igdb-client-id"
  IGDB_CLIENT_SECRET: "test-igdb-client-secret"
  RESET_BASE_URL: "http://testserver"
  SMTP_HOST: ""

services:
  backend-test:
    build:
      context: ./backend
      dockerfile: Dockerfile.test
    environment:
      <<: *test-env
      DEBUG: "false"
    volumes:
      - ./backend:/backend
      - ./contracts:/contracts

  backend-server:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    environment:
      <<: *test-env
      FLASK_APP: app.py
      DEBUG: "true"
    volumes:
      - ./backend:/backend
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import socket; s=socket.socket(); s.connect(('localhost', 5000)); s.close()\""]
      interval: 2s
      timeout: 5s
      retries: 15
      start_period: 5s

  frontend-test:
    build:
      context: ./frontend
      dockerfile: Dockerfile.test
    depends_on:
      backend-server:
        condition: service_healthy
    environment:
      BACKEND_URL: http://backend-server:5000
      ADMIN_KEY: test-admin-key
    volumes:
      - ./frontend:/frontend
      - ./contracts:/contracts
