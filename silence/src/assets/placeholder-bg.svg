<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 90" preserveAspectRatio="xMidYMid slice">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="75%">
      <stop offset="0%" stop-color="#152040"/>
      <stop offset="100%" stop-color="#050a12"/>
    </radialGradient>
    <pattern id="diamonds" width="16" height="16" patternUnits="userSpaceOnUse" patternTransform="rotate(0)">
      <path d="M8 0 L16 8 L8 16 L0 8 Z" fill="none" stroke="#ffffff" stroke-width="0.3" opacity="0.07"/>
    </pattern>
  </defs>
  <rect width="160" height="90" fill="url(#bg)"/>
  <rect width="160" height="90" fill="url(#diamonds)"/>
  <!-- subtle horizontal scanlines -->
  <rect width="160" height="90" fill="url(#bg)" opacity="0.3"/>
</svg>
