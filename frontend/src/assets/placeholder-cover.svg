<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 45 64" preserveAspectRatio="xMidYMid slice">
  <defs>
    <radialGradient id="bg" cx="50%" cy="40%" r="70%">
      <stop offset="0%" stop-color="#1e3060"/>
      <stop offset="100%" stop-color="#080e1e"/>
    </radialGradient>
    <pattern id="grid" width="6" height="6" patternUnits="userSpaceOnUse">
      <path d="M 6 0 L 0 0 0 6" fill="none" stroke="#ffffff" stroke-width="0.15" opacity="0.12"/>
    </pattern>
  </defs>
  <rect width="45" height="64" fill="url(#bg)"/>
  <rect width="45" height="64" fill="url(#grid)"/>
  <!-- controller body -->
  <g transform="translate(22.5,34)" opacity="0.18" fill="#ffffff">
    <rect x="-10" y="-6" width="20" height="12" rx="6"/>
    <!-- left grip -->
    <rect x="-13" y="-1" width="5" height="8" rx="2.5"/>
    <!-- right grip -->
    <rect x="8" y="-1" width="5" height="8" rx="2.5"/>
    <!-- d-pad -->
    <rect x="-8.5" y="-3.5" width="2" height="7" rx="1"/>
    <rect x="-10.5" y="-1.5" width="6" height="3" rx="1"/>
    <!-- buttons -->
    <circle cx="5.5" cy="-2" r="1.2"/>
    <circle cx="7.5" cy="0" r="1.2"/>
    <circle cx="5.5" cy="2" r="1.2"/>
    <circle cx="3.5" cy="0" r="1.2"/>
  </g>
</svg>
