
services:
  app:
    build:
      context: ./app
      dockerfile: Dockerfile.dev
    ports:
      - "5000:5000"
    environment:
      FLASK_ENV: production
      HTTP_SERVER_PORT: 80
#    depends_on:
#      - redis
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:5000 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3


networks:
  app-network:
    driver: bridge
