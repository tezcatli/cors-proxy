services:
  corsproxy:
    build:
      context: ./corsproxy
      dockerfile: Dockerfile.dev
    ports:
      - "5000:5000"
    environment:
      DEBUG: "true"
    env_file:
      - path: ./corsproxy_secrets.env
        required: true
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:5000 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
    volumes:
      - ./corsproxy:/corsproxy
      - ./silence/dist:/corsproxy/static

  silence:
    build:
      context: ./silence
      dockerfile: Dockerfile.dev
    volumes:
      - ./silence:/silence
