services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    ports:
      - "5000:5000"
    environment:
      DEBUG: "true"
      LOGGER_LEVEL: "DEBUG"
      VITE_DEV_SERVER: "true"
    env_file:
      - path: ./backend_secrets.env
        required: true
    healthcheck:
      # curl is not in the python image, so probe /healthz with the stdlib — the
      # curl version failed every time and left the container marked unhealthy.
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:5000/healthz').status==200 else 1)"]
      interval: 30s
      timeout: 10s
      retries: 3
    volumes:
      - ./backend:/backend
      - ./frontend/dist:/backend/static

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/frontend
